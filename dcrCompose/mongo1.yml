version: "3.1"
services:
  serv1:
    image: heartocean/docom:1
    environment:
      MONGO_DB_USERNAME: devdb
      MONGO_DB_PASSWORD: devdb@123
      MONGO_DB_HOSTNAME: dbmongo
    ports:
      - 80:8080
    networks:
      - springnet
  dbmongo:
    image: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: devdb
      MONGO_INITDB_ROOT_PASSWORD: devdb@123
    expose:
      - 27017
    networks:
      - springnet
    volumes:
      - mongovol1
networks:
  springnet:
  springappnet:
volumes: 
  mongovol1:
